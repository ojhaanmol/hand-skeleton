<!DOCTYPE html>
<html>
<body>
  <canvas id="c" width="1000" height="1000" style="border: 1px solid #ccc;"></canvas>

  <script>

    const ws = new WebSocket('ws://localhost:3000');

    ws.onmessage = (event) => {

      const text = event.data;
      const lastChages= String(text).trim();
      drawOnCanvas( String( lastChages ).trim().split(',').map(Number) );

    };

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function drawOnCanvas([

      x0, y0,
      x1, y1,
      x2, y2,
      x3, y3,
      x4, y4,

      x5, y5,
      x6, y6,
      x7, y7,
      x8, y8,

      x9, y9,
      x10, y10,
      x11, y11,
      x12, y12,

      x13, y13,
      x14, y14,
      x15, y15,
      x16, y16,
      
      x17, y17,
      x18, y18,
      x19, y19,
      x20, y20

    ]){

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawThumb({
        x0, x1, x2, x3, x4,
        y0, y1, y2, y3, y4
      });

      drawIndex({
        x5, x6, x7, x8,
        y5, y6, y7, y8
      });
    
      drawMiddle({
        x9, x10, x11, x12,
        y9, y10, y11, y12
      });

      drawRing({
        x13, x14, x15, x16,
        y13, y14, y15, y16
      });

      drawPinky({
        x17, x18, x19, x20,
        y17, y18, y19, y20
      });

      drawKnuckle({
        x2, x5, x9, x13, x17,
        y2, y5, y9, y13, y17
      })

    }

    function drawKnuckle({
      x2, x5, x9, x13, x17,
      y2, y5, y9, y13, y17
    }){

      drawLine({
        x1: x2,
        x2: x5,
        y1: y2,
        y2: y5
      })

      drawLine({
        x1: x5,
        x2: x9,
        y1: y5,
        y2: y9
      });

      drawLine({
        x1: x9,
        x2: x13,
        y1: y9,
        y2: y13
      });

      drawLine({
        x1: x13,
        x2: x17,
        y1: y13,
        y2: y17
      });

    }

    function drawThumb({
      x0, x1, x2, x3, x4,
      y0, y1, y2, y3, y4
    }){

      drawLine({
        x1: x0,
        x2: x1,
        y1: y0,
        y2: y1
      });

      drawLine({
        x1,
        x2,
        y1,
        y2
      });

      drawLine({
        x1: x2,
        x2: x3,
        y1: y2,
        y2: y3
      });

      drawLine({
        x1: x3,
        x2: x4,
        y1: y3,
        y2: y4
      });

    }

    function drawIndex({
      x5, x6, x7, x8,
      y5, y6, y7, y8
    }){

      drawLine({
        x1: x5,
        x2: x6,
        y1: y5,
        y2: y6
      });

      drawLine({
        x1: x6,
        x2: x7,
        y1: y6,
        y2: y7
      });

      drawLine({
        x1: x7,
        x2: x8,
        y1: y7,
        y2: y8
      });

    }

    function drawMiddle({
      x9, x10, x11, x12,
      y9, y10, y11, y12
    }){

      drawLine({
        x1: x9,
        x2: x10,
        y1: y9,
        y2: y10
      });

      drawLine({
        x1: x10,
        x2: x11,
        y1: y10,
        y2: y11
      });

      drawLine({
        x1: x11,
        x2: x12,
        y1: y11,
        y2: y12
      });

    }

    function drawRing({
      x13, x14, x15, x16,
      y13, y14, y15, y16
    }){

      drawLine({
        x1: x13,
        x2: x14,
        y1: y13,
        y2: y14
      });

      drawLine({
        x1: x14,
        x2: x15,
        y1: y14,
        y2: y15
      });

      drawLine({
        x1: x15,
        x2: x16,
        y1: y15,
        y2: y16
      });

    }

    function drawPinky({
      x17, x18, x19, x20,
      y17, y18, y19, y20
    }){

      drawLine({
        x1: x17,
        x2: x18,
        y1: y17,
        y2: y18
      });

      drawLine({
        x1: x18,
        x2: x19,
        y1: y18,
        y2: y19
      });

      drawLine({
        x1: x19,
        x2: x20,
        y1: y19,
        y2: y20
      });

    }

    function drawLine({ x1, y1, x2, y2 }){

      ctx.beginPath();

      ctx.moveTo( (1- x1) * 1000, y1 * 1000 );
      ctx.lineTo( (1- x2) * 1000, y2 * 1000 );

      ctx.strokeStyle = '#5340B7';
      ctx.lineWidth = 2;
      ctx.stroke();

      drawJoint( { x: 1- x1, y: y1 } );
      drawJoint( { x: 1- x2, y: y2 } );

    }

    function drawJoint( { x, y } ){

      ctx.beginPath();

      ctx.arc( x * 1000, y * 1000, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#0F6E56';
      ctx.fill();

    }

  </script>
</body>
</html>
