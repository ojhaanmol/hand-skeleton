<!DOCTYPE html>
<html>
<body>
  <canvas id="c" width="1000" height="1000" style="border: 1px solid #ccc;"></canvas>

  <script>

    const ws = new WebSocket('ws://localhost:3000');

    ws.onmessage = (event) => {

      const text = event.data;
      const lastChages= String(text).trim();
      drawOnCanvas( String( lastChages ).trim().split(',').map(Number) );

    };

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function drawOnCanvas([

      x0, y0,
      x1, y1,
      x2, y2,
      x3, y3,
      x4, y4,

      x5, y5,
      x6, y6,
      x7, y7,
      x8, y8,

      x9, y9,
      x10, y10,
      x11, y11,
      x12, y12,

      x13, y13,
      x14, y14,
      x15, y15,
      x16, y16,
      
      x17, y17,
      x18, y18,
      x19, y19,
      x20, y20,


      x21, y21,
      x22, y22,
      x23, y23,
      x24, y24,
      x25, y25,

      x26, y26,
      x27, y27,
      x28, y28,
      x29, y29,

      x30, y30,
      x31, y31,
      x32, y32,
      x33, y33,

      x34, y34,
      x35, y35,
      x36, y36,
      x37, y37,
      
      x38, y38,
      x39, y39,
      x40, y40,
      x41, y41

    ]){

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawThumb({
        x0, x1, x2, x3, x4,
        y0, y1, y2, y3, y4,

        x21, x22, x23, x24, x25,
        y21, y22, y23, y24, y25,
      });

      drawIndex({
        x5, x6, x7, x8,
        y5, y6, y7, y8,

        x26, x27, x28, x29,
        y26, y27, y28, y29,
      });
    
      drawMiddle({
        x9, x10, x11, x12,
        y9, y10, y11, y12,

        x30, x31, x32, x33,
        y30, y31, y32, y33,
      });

      drawRing({
        x13, x14, x15, x16,
        y13, y14, y15, y16,

        x34, x35, x36, x37,
        y34, y35, y36, y37,
      });

      drawPinky({
        x17, x18, x19, x20,
        y17, y18, y19, y20,

        x38, x39, x40, x41,
        y38, y39, y40, y41

      });

      drawKnuckle({
        x2, x5, x9, x13, x17,
        y2, y5, y9, y13, y17,

        x23, x26, x30, x34, x38,
        y23, y26, y30, y34, y38,
      })

    }

    function drawKnuckle({
      x2, x5, x9, x13, x17,
      y2, y5, y9, y13, y17,

      x23, x26, x30, x34, x38,
      y23, y26, y30, y34, y38,

    }){

      drawLine({
        x1: x2,
        x2: x5,
        y1: y2,
        y2: y5
      })

      drawLine({
        x1: x5,
        x2: x9,
        y1: y5,
        y2: y9
      });

      drawLine({
        x1: x9,
        x2: x13,
        y1: y9,
        y2: y13
      });

      drawLine({
        x1: x13,
        x2: x17,
        y1: y13,
        y2: y17
      });

      drawLine({
        x1: x23,
        x2: x26,
        y1: y23,
        y2: y26
      })

      drawLine({
        x1: x26,
        x2: x30,
        y1: y26,
        y2: y30
      });

      drawLine({
        x1: x30,
        x2: x34,
        y1: y30,
        y2: y34
      });

      drawLine({
        x1: x34,
        x2: x38,
        y1: y34,
        y2: y38
      });


    }

    function drawThumb({
      x0, x1, x2, x3, x4,
      y0, y1, y2, y3, y4,
      
      x21, x22, x23, x24, x25,
      y21, y22, y23, y24, y25,

    }){

      drawLine({
        x1: x0,
        x2: x1,
        y1: y0,
        y2: y1
      });

      drawLine({
        x1,
        x2,
        y1,
        y2
      });

      drawLine({
        x1: x2,
        x2: x3,
        y1: y2,
        y2: y3
      });

      drawLine({
        x1: x3,
        x2: x4,
        y1: y3,
        y2: y4
      });

      drawLine({
        x1: x21,
        x2: x22,
        y1: y21,
        y2: y22
      });

      drawLine({
        x1: x22,
        x2: x23,
        y1: y22,
        y2: y23
      });

      drawLine({
        x1: x23,
        x2: x24,
        y1: y23,
        y2: y24
      });

      drawLine({
        x1: x24,
        x2: x25,
        y1: y24,
        y2: y25
      });

    }

    function drawIndex({
      x5, x6, x7, x8,
      y5, y6, y7, y8,

      x26, x27, x28, x29,
      y26, y27, y28, y29,

    }){

      drawLine({
        x1: x5,
        x2: x6,
        y1: y5,
        y2: y6
      });

      drawLine({
        x1: x6,
        x2: x7,
        y1: y6,
        y2: y7
      });

      drawLine({
        x1: x7,
        x2: x8,
        y1: y7,
        y2: y8
      });

      drawLine({
        x1: x26,
        x2: x27,
        y1: y26,
        y2: y27
      });

      drawLine({
        x1: x27,
        x2: x28,
        y1: y27,
        y2: y28
      });

      drawLine({
        x1: x28,
        x2: x29,
        y1: y28,
        y2: y29
      });

    }

    function drawMiddle({
      x9, x10, x11, x12,
      y9, y10, y11, y12,

      x30, x31, x32, x33,
      y30, y31, y32, y33,

    }){

      drawLine({
        x1: x9,
        x2: x10,
        y1: y9,
        y2: y10
      });

      drawLine({
        x1: x10,
        x2: x11,
        y1: y10,
        y2: y11
      });

      drawLine({
        x1: x11,
        x2: x12,
        y1: y11,
        y2: y12
      });

      drawLine({
        x1: x30,
        x2: x31,
        y1: y30,
        y2: y31
      });

      drawLine({
        x1: x31,
        x2: x32,
        y1: y31,
        y2: y32
      });

      drawLine({
        x1: x32,
        x2: x33,
        y1: y32,
        y2: y33
      });

    }

    function drawRing({
      x13, x14, x15, x16,
      y13, y14, y15, y16,

      x34, x35, x36, x37,
      y34, y35, y36, y37,
    }){

      drawLine({
        x1: x13,
        x2: x14,
        y1: y13,
        y2: y14
      });

      drawLine({
        x1: x14,
        x2: x15,
        y1: y14,
        y2: y15
      });

      drawLine({
        x1: x15,
        x2: x16,
        y1: y15,
        y2: y16
      });

      drawLine({
        x1: x34,
        x2: x35,
        y1: y34,
        y2: y35
      });

      drawLine({
        x1: x35,
        x2: x36,
        y1: y35,
        y2: y36
      });

      drawLine({
        x1: x36,
        x2: x37,
        y1: y36,
        y2: y37
      });

    }

    function drawPinky({
      x17, x18, x19, x20,
      y17, y18, y19, y20,

      x38, x39, x40, x41,
      y38, y39, y40, y41
    }){

      drawLine({
        x1: x17,
        x2: x18,
        y1: y17,
        y2: y18
      });

      drawLine({
        x1: x18,
        x2: x19,
        y1: y18,
        y2: y19
      });

      drawLine({
        x1: x19,
        x2: x20,
        y1: y19,
        y2: y20
      });

      drawLine({
        x1: x38,
        x2: x39,
        y1: y38,
        y2: y39
      });

      drawLine({
        x1: x39,
        x2: x40,
        y1: y39,
        y2: y40
      });

      drawLine({
        x1: x40,
        x2: x41,
        y1: y40,
        y2: y41
      });

    }

    function drawLine({ x1, y1, x2, y2 }){

      ctx.beginPath();

      ctx.moveTo( (1- x1) * 1000, y1 * 1000 );
      ctx.lineTo( (1- x2) * 1000, y2 * 1000 );

      ctx.strokeStyle = '#5340B7';
      ctx.lineWidth = 2;
      ctx.stroke();

      drawJoint( { x: 1- x1, y: y1 } );
      drawJoint( { x: 1- x2, y: y2 } );

    }

    function drawJoint( { x, y } ){

      ctx.beginPath();

      ctx.arc( x * 1000, y * 1000, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#0F6E56';
      ctx.fill();

    }

  </script>
</body>
</html>
